<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokéWish</title>
  <meta name="theme-color" content="#e94560" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PokéWish" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <link rel="stylesheet" href="/css/main.css" />
  <script type="importmap">
  {
    "imports": {
      "lit": "https://esm.sh/lit@3",
      "lit/": "https://esm.sh/lit@3/"
    }
  }
  </script>
</head>
<body>
<div id="app">
  <nav class="topbar">
    <span class="brand">🎮 PokéWish</span>
    <!-- Desktop nav links -->
    <a href="#/" class="nav-link nav-desktop">Pokédex</a>
    <a id="nav-admin" href="#/admin" class="nav-link nav-desktop" style="display:none">Admin</a>
    <span class="user-info nav-desktop" id="nav-user"></span>
    <button id="nav-logout" class="btn btn-ghost nav-desktop" style="display:none">Salir</button>
    <!-- Hamburger (mobile only) -->
    <button id="nav-hamburger" class="btn btn-ghost nav-mobile" aria-label="Menú">&#9776;</button>
  </nav>
  <!-- Mobile dropdown menu -->
  <div id="nav-menu" class="nav-menu" hidden>
    <a href="#/" class="nav-menu-link" id="nav-menu-pokédex">Pokédex</a>
    <a id="nav-menu-admin" href="#/admin" class="nav-menu-link" style="display:none">Admin</a>
    <span class="nav-menu-user" id="nav-menu-user"></span>
    <button id="nav-menu-logout" class="btn btn-ghost nav-menu-logout" style="display:none">Salir</button>
  </div>

  <main id="main-content"></main>
</div>

<div id="toast-container" class="toast-container"></div>

<!-- Components -->
<script type="module" src="/js/components/login-page.js"></script>
<script type="module" src="/js/components/register-page.js"></script>
<script type="module" src="/js/components/pokemon-list.js"></script>
<script type="module" src="/js/components/pokemon-table.js"></script>
<script type="module" src="/js/components/pokemon-card.js"></script>
<script type="module" src="/js/components/pokemon-filters.js"></script>
<script type="module" src="/js/components/flag-toggle.js"></script>
<script type="module" src="/js/components/admin-panel.js"></script>
<script type="module" src="/js/components/user-manager.js"></script>
<script type="module" src="/js/components/invite-creator.js"></script>
<script type="module" src="/js/components/source-updater.js"></script>

<!-- Router -->
<script type="module" src="/js/app.js"></script>

<!-- Registro del Service Worker (PWA) -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch((err) => {
      console.warn('Service Worker no registrado:', err);
    });
  }
</script>
</body>
</html>
